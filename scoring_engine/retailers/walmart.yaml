retailer: walmart
name: Walmart (US Grocery / Consumables)
otif_threshold: "98% composite (On-Time 90% prepaid, In-Full 95%, On-Time 98% collect)"
otif_penalty: "3% of COGS per non-compliant PO"
otif_confidence: High
fsma_204_required: true
gdsn_required: true
portal: "Item 360 via Retail Link (itemmanager.walmart.com)"
notes: >
  Thresholds verified against RetailPath, Zipline Logistics, and Orderful sources.
  FSMA 204 KDE requirement effective August 1, 2025 for all food/beverage shipments.
  EDI via AS2 required. 855 ASN timing: must be transmitted before trailer gates at DC.

dimensions:
  productData:
    label: Product Data
    max_points: 7
    green_threshold: 70
    yellow_threshold: 30
    fix: "Validate all GTINs in GS1 registry; complete trade item hierarchy documentation."
    questions:
      - id: pd_gtin_valid
        text: "Are your GTINs valid and registered in the GS1 registry?"
        gate: true
        options:
          yes: 3
          partial: 1
          no: 0  # Red gate — item setup cannot proceed
      - id: pd_hierarchy
        text: "Is your trade item hierarchy (each/inner/case) documented and accurate?"
        options:
          yes: 2
          partial: 1
          no: 0
      - id: pd_item360
        text: "Are your Item 360 / GDSN attributes complete in Retail Link?"
        walmart_only: true
        options:
          yes: 2
          partial: 1
          no: 0

  syndication:
    label: Syndication
    max_points: 5
    green_threshold: 70
    yellow_threshold: 30
    fix: "Establish 1WorldSync account; complete GDSN syndication for all launch SKUs."
    questions:
      - id: syn_gdsn_active
        text: "Is your 1WorldSync/GDSN account active?"
        gate: true
        options:
          yes: 3
          partial: 1
          no: 0  # Red gate
      - id: syn_coverage
        text: "What percentage of your launch SKUs are fully syndicated?"
        options:
          yes: 2   # All SKUs
          partial: 1
          no: 0

  edi:
    label: EDI Capability
    max_points: 9
    green_threshold: 70
    yellow_threshold: 30
    fix: "Implement EDI capability (850/855/856/810/997); ensure ASN before gate-in; add FSMA 204 KDEs."
    required_sets: [850, 855, 856, 810, 997, 820, 824]
    protocol: AS2
    asn_timing: "Before trailer gates at DC. Best practice: within 30 min of carrier pickup."
    questions:
      - id: edi_asn_capable
        text: "Can you receive 850 POs and transmit 856 ASNs electronically?"
        gate: true
        options:
          yes: 3
          partial: 1
          no: 0  # Red gate
      - id: edi_asn_timing
        text: "Are your ASNs transmitted before the trailer gates at the DC?"
        options:
          yes: 2
          partial: 1
          no: 0
      - id: edi_fsma204
        text: "Do your ASNs include FSMA 204 Key Data Elements?"
        walmart_only: true
        notes: "Required as of August 1, 2025 for all food/beverage shipments."
        options:
          yes: 2
          partial: 1
          no: 0
      - id: edi_label_compliant
        text: "Are your GS1-128 shipping labels with SSCC-18 compliant and matching your ASN?"
        options:
          yes: 2
          partial: 1
          no: 0

  fulfillment:
    label: Fulfillment
    max_points: 5
    green_threshold: 75
    yellow_threshold: 40
    fix: "Improve delivery consistency; update label format to GS1-128 with correct SSCC-18."
    notes: "Higher green threshold (75) reflects Walmart's strict 98% OTIF composite."
    questions:
      - id: ff_otif_rate
        text: "Is your current OTIF rate at or above Walmart's 98% composite threshold?"
        gate: true
        options:
          yes: 3   # At or above 98%
          partial: 1   # 93–97%
          no: 0   # Below 93% — Red gate
      - id: ff_label_compliant
        text: "Are your shipping labels GS1-128 with accurate SSCC-18 matching your ASN?"
        options:
          yes: 2
          partial: 1
          no: 0

  financial:
    label: Financial Readiness
    max_points: 5
    green_threshold: 70
    yellow_threshold: 30
    fix: "Model full year-one cost structure; confirm 90-day cash position including chargeback reserve."
    questions:
      - id: fin_cost_modeled
        text: "Have you modeled year-one retailer costs (slotting, trade spend, 60-90 day payment terms)?"
        gate: true
        options:
          yes: 3
          partial: 1
          no: 0  # Red gate
      - id: fin_cash_runway
        text: "Do you have sufficient cash runway for the first 90 days including a chargeback buffer?"
        options:
          yes: 2
          partial: 1
          no: 0

  production:
    label: Production Capacity
    max_points: 5
    green_threshold: 70
    yellow_threshold: 30
    fix: "Confirm co-packer capacity in writing; align production schedule with buyer delivery window."
    questions:
      - id: prod_capacity_confirmed
        text: "Has your co-packer confirmed capacity for projected launch volume in writing?"
        gate: true
        options:
          yes: 3
          partial: 1
          no: 0  # Red gate
      - id: prod_lead_time
        text: "Is your production lead time within the buyer's required delivery window?"
        options:
          yes: 2
          partial: 1
          no: 0

  compliance:
    label: Compliance
    max_points: 5
    green_threshold: 70
    yellow_threshold: 30
    fix: "Update FSMA PCQI documentation; verify allergen consistency across all touchpoints."
    questions:
      - id: comp_fsma_pcqi
        text: "Is your FSMA PCQI documentation current and on file?"
        options:
          yes: 3
          partial: 1
          no: 0
      - id: comp_allergens
        text: "Are allergen declarations consistent across your label, spec sheet, and GDSN data?"
        options:
          yes: 2
          partial: 1
          no: 0

  team:
    label: Team & Process
    max_points: 5
    green_threshold: 70
    yellow_threshold: 30
    fix: "Assign a named retailer owner; create chargeback dispute process and response SLA."
    questions:
      - id: team_owner
        text: "Is there a named person who owns the day-to-day Walmart relationship?"
        gate: true
        options:
          yes: 3
          partial: 1
          no: 0  # Red gate
      - id: team_chargeback_process
        text: "Do you have a defined process for disputing chargebacks and deductions?"
        options:
          yes: 2
          partial: 1
          no: 0
